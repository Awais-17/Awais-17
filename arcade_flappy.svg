<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 340 190" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0A1C33"/>
<stop offset="100%" stop-color="#050B14"/>
</linearGradient>
<linearGradient id="pg" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#00F3FF"/>
<stop offset="100%" stop-color="#005A7A"/>
</linearGradient>
<filter id="glo" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="2" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<!-- Sky Background -->
<rect width="340" height="190" fill="url(#sky)"/>

<!-- Grid lines -->
<path d="M0 35H340M0 70H340M0 105H340M0 140H340" stroke="#00F3FF" stroke-width="0.5" opacity="0.12"/>
<path d="M50 0V190M100 0V190M150 0V190M200 0V190M250 0V190M300 0V190" stroke="#00F3FF" stroke-width="0.5" opacity="0.12"/>

<!-- Border -->
<rect x="1" y="1" width="338" height="188" stroke="#00F3FF" stroke-width="1.5" fill="none" opacity="0.6" rx="0"/>

<!-- Stars -->
<circle cx="30" cy="20" r="1" fill="#FFF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
<circle cx="280" cy="15" r="0.8" fill="#FFF"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.2s" repeatCount="indefinite"/></circle>
<circle cx="190" cy="30" r="1" fill="#00F3FF"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/></circle>

<!-- PIPES GROUP 1 - scrolling right to left -->
<g>
<animateTransform attributeName="transform" type="translate" values="360,0;-120,0" dur="5s" repeatCount="indefinite"/>
<!-- Top pipe -->
<rect x="0" y="0" width="30" height="55" fill="url(#pg)" stroke="#00F3FF" stroke-width="1.2" opacity="0.8"/>
<rect x="-3" y="47" width="36" height="8" fill="#00F3FF" opacity="0.9"/>
<!-- Bottom pipe -->
<rect x="0" y="130" width="30" height="60" fill="url(#pg)" stroke="#00F3FF" stroke-width="1.2" opacity="0.8"/>
<rect x="-3" y="130" width="36" height="8" fill="#00F3FF" opacity="0.9"/>
</g>

<!-- PIPES GROUP 2 - offset -->
<g>
<animateTransform attributeName="transform" type="translate" values="360,0;-120,0" dur="5s" begin="2.5s" repeatCount="indefinite"/>
<!-- Top pipe -->
<rect x="0" y="0" width="30" height="80" fill="url(#pg)" stroke="#00F3FF" stroke-width="1.2" opacity="0.8"/>
<rect x="-3" y="72" width="36" height="8" fill="#00F3FF" opacity="0.9"/>
<!-- Bottom pipe -->
<rect x="0" y="155" width="30" height="35" fill="url(#pg)" stroke="#00F3FF" stroke-width="1.2" opacity="0.8"/>
<rect x="-3" y="155" width="36" height="8" fill="#00F3FF" opacity="0.9"/>
</g>

<!-- PIPES GROUP 3 -->
<g>
<animateTransform attributeName="transform" type="translate" values="360,0;-120,0" dur="5s" begin="1.2s" repeatCount="indefinite"/>
<rect x="0" y="0" width="30" height="38" fill="url(#pg)" stroke="#00F3FF" stroke-width="1.2" opacity="0.8"/>
<rect x="-3" y="30" width="36" height="8" fill="#00F3FF" opacity="0.9"/>
<rect x="0" y="115" width="30" height="75" fill="url(#pg)" stroke="#00F3FF" stroke-width="1.2" opacity="0.8"/>
<rect x="-3" y="115" width="36" height="8" fill="#00F3FF" opacity="0.9"/>
</g>

<!-- CYBER BIRD -->
<g filter="url(#glo)">
<!-- Bird bobs up and down -->
<g>
<animateTransform attributeName="transform" type="translate" values="0,0;0,-35;0,0" dur="2.4s" repeatCount="indefinite"/>
<!-- Jetpack body -->
<rect x="37" y="87" width="8" height="10" fill="#FF7B00" rx="2"/>
<!-- Main body -->
<rect x="42" y="85" width="18" height="13" rx="4" fill="#00F3FF" stroke="#FFF" stroke-width="1"/>
<!-- Visor eye -->
<rect x="53" y="88" width="8" height="4" rx="1" fill="#FF0055"/>
<!-- Booster flame -->
<polygon points="28,92 36,87 36,97" fill="#FF7B00">
<animate attributeName="opacity" values="0.3;1;0.3" dur="0.15s" repeatCount="indefinite"/>
</polygon>
<!-- Wing flap indicator -->
<rect x="45" y="82" width="10" height="3" rx="1" fill="#00F3FF" opacity="0.5">
<animate attributeName="y" values="82;79;82" dur="0.6s" repeatCount="indefinite"/>
</rect>
</g>
</g>

<!-- SCORE HUD -->
<rect x="130" y="8" width="80" height="22" rx="4" fill="#050B14" stroke="#00F3FF" stroke-width="1" opacity="0.9"/>
<text x="170" y="23" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#00F3FF">
SCORE:
<tspan fill="#FFF">
<animate attributeName="textContent" values="02;03;04;05;06" dur="10s" repeatCount="indefinite"/>
03
</tspan>
</text>

<!-- HUD corners -->
<g stroke="#00F3FF" stroke-width="1" opacity="0.3">
<path d="M5 15L5 5L15 5" fill="none"/>
<path d="M335 15L335 5L325 5" fill="none"/>
<path d="M5 175L5 185L15 185" fill="none"/>
<path d="M335 175L335 185L325 185" fill="none"/>
</g>

<!-- Status text -->
<text x="12" y="185" font-family="monospace" font-size="7" fill="#00F3FF" opacity="0.4">FLAPPY_BIRD.EXE</text>
<text x="328" y="185" text-anchor="end" font-family="monospace" font-size="7" fill="#00F3FF" opacity="0.4">FPS:60</text>

</svg>
