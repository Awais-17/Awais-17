<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="g14" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
<stop offset="50%" stop-color="#8BE9FD" stop-opacity="0.7"/>
<stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
</linearGradient>
<filter id="gl14" x="-10%" y="-30%" width="120%" height="160%">
<feGaussianBlur stdDeviation="1.5" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<!-- Top rail -->
<path d="M80 20H310L330 30L350 20H450L470 30L490 20H720" stroke="#00F0FF" stroke-width="0.8" opacity="0.25"/>
<!-- Bottom rail -->
<path d="M80 40H310L330 30L350 40H450L470 30L490 40H720" stroke="#00F0FF" stroke-width="0.5" opacity="0.15"/>

<!-- Left endpoint arrow -->
<path d="M80 20L60 30L80 40" stroke="#00F0FF" stroke-width="1" opacity="0.35" fill="none"/>
<line x1="0" y1="30" x2="60" y2="30" stroke="url(#g14)" stroke-width="1"/>

<!-- Right endpoint arrow -->
<path d="M720 20L740 30L720 40" stroke="#00F0FF" stroke-width="1" opacity="0.35" fill="none"/>
<line x1="740" y1="30" x2="800" y2="30" stroke="url(#g14)" stroke-width="1"/>

<!-- Center diamond cluster -->
<rect x="392" y="22" width="16" height="16" rx="1" stroke="#FF79C6" stroke-width="1" fill="none" opacity="0.5" transform="rotate(45 400 30)">
<animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
</rect>
<rect x="395" y="25" width="10" height="10" rx="1" stroke="#00F0FF" stroke-width="0.8" fill="none" opacity="0.4" transform="rotate(45 400 30)">
<animateTransform attributeName="transform" type="rotate" from="45 400 30" to="405 400 30" dur="8s" repeatCount="indefinite"/>
</rect>
<circle cx="400" cy="30" r="2.5" fill="#00F0FF" opacity="0.8">
<animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
</circle>

<!-- Data flow pulses -->
<circle cx="0" cy="30" r="1.5" fill="#00F0FF" filter="url(#gl14)">
<animate attributeName="cx" values="80;400" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="0" cy="30" r="1.5" fill="#FF79C6" filter="url(#gl14)">
<animate attributeName="cx" values="720;400" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
</circle>

<!-- Chevron ticks -->
<g opacity="0.2" stroke="#00F0FF" stroke-width="0.8">
<path d="M330 20V40" fill="none"/><path d="M470 20V40" fill="none"/>
</g>
</svg>