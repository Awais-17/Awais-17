<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="gm9" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="2" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="gm9g" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
<stop offset="50%" stop-color="#00F0FF" stop-opacity="0.6"/>
<stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- Dashed rails -->
<line x1="0" y1="30" x2="340" y2="30" stroke="#251B47" stroke-width="1" stroke-dasharray="8 6"/>
<line x1="460" y1="30" x2="800" y2="30" stroke="#251B47" stroke-width="1" stroke-dasharray="8 6"/>

<!-- Diamond ring (rotating) -->
<rect x="388" y="18" width="24" height="24" rx="2" stroke="#9D7ECF" stroke-width="1.5" fill="none" transform="rotate(45 400 30)">
<animateTransform attributeName="transform" type="rotate" from="45 400 30" to="405 400 30" dur="8s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.35;0.75;0.35" dur="3s" repeatCount="indefinite"/>
</rect>

<!-- Inner diamond (counter-rotating) -->
<rect x="393" y="23" width="14" height="14" rx="1" stroke="#00F0FF" stroke-width="1" fill="none" transform="rotate(45 400 30)">
<animateTransform attributeName="transform" type="rotate" from="405 400 30" to="45 400 30" dur="6s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
</rect>

<!-- Center glow -->
<circle cx="400" cy="30" r="4" fill="#00F0FF" opacity="0.6" filter="url(#gm9)">
<animate attributeName="r" values="3;5.5;3" dur="2s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="400" cy="30" r="1.5" fill="#FFF" opacity="0.9"/>

<!-- Connector brackets -->
<path d="M345 24L355 30L345 36" stroke="#9D7ECF" stroke-width="1" fill="none" opacity="0.4"/>
<path d="M455 24L445 30L455 36" stroke="#9D7ECF" stroke-width="1" fill="none" opacity="0.4"/>

<!-- Data pulses toward center -->
<circle cx="0" cy="30" r="1.5" fill="#9D7ECF" filter="url(#gm9)">
<animate attributeName="cx" values="200;400" dur="2s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.7;0" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="0" cy="30" r="1.5" fill="#9D7ECF" filter="url(#gm9)">
<animate attributeName="cx" values="600;400" dur="2s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.7;0" dur="2s" repeatCount="indefinite"/>
</circle>
</svg>