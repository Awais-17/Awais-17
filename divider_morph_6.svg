<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="gm6" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="2" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<!-- Rails with angular steps -->
<path d="M0 30H320L340 20H360" stroke="#251B47" stroke-width="1" stroke-dasharray="6 4"/>
<path d="M440 20H460L480 30H800" stroke="#251B47" stroke-width="1" stroke-dasharray="6 4"/>

<!-- Triple concentric circles (expanding) -->
<circle cx="400" cy="30" r="18" stroke="#9D7ECF" stroke-width="1" fill="none" stroke-dasharray="6 4">
<animateTransform attributeName="transform" type="rotate" from="0 400 30" to="360 400 30" dur="15s" repeatCount="indefinite"/>
<animate attributeName="r" values="16;20;16" dur="4s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.25;0.55;0.25" dur="4s" repeatCount="indefinite"/>
</circle>
<circle cx="400" cy="30" r="12" stroke="#00F0FF" stroke-width="1.2" fill="none" stroke-dasharray="4 3">
<animateTransform attributeName="transform" type="rotate" from="360 400 30" to="0 400 30" dur="10s" repeatCount="indefinite"/>
<animate attributeName="r" values="11;14;11" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="400" cy="30" r="6" stroke="#FF79C6" stroke-width="1.5" fill="none">
<animate attributeName="r" values="5;8;5" dur="2.5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
</circle>

<!-- Core dot -->
<circle cx="400" cy="30" r="2" fill="#FFF" opacity="0.9"/>

<!-- Crosshair -->
<line x1="400" y1="8" x2="400" y2="52" stroke="#00F0FF" stroke-width="0.4" opacity="0.2"/>
<line x1="375" y1="30" x2="425" y2="30" stroke="#00F0FF" stroke-width="0.4" opacity="0.2"/>
</svg>