<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="ag1" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
<stop offset="15%" stop-color="#00F0FF" stop-opacity="0.5"/>
<stop offset="50%" stop-color="#C9B8FF" stop-opacity="0.9"/>
<stop offset="85%" stop-color="#00F0FF" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
</linearGradient>
<linearGradient id="ag2" x1="100%" y1="0%" x2="0%" y2="0%">
<stop offset="0%" stop-color="#FF79C6" stop-opacity="0"/>
<stop offset="20%" stop-color="#7B2FBE" stop-opacity="0.4"/>
<stop offset="50%" stop-color="#8BE9FD" stop-opacity="0.7"/>
<stop offset="80%" stop-color="#7B2FBE" stop-opacity="0.4"/>
<stop offset="100%" stop-color="#FF79C6" stop-opacity="0"/>
</linearGradient>
<linearGradient id="ag3" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#FF2D78" stop-opacity="0"/>
<stop offset="30%" stop-color="#FF79C6" stop-opacity="0.3"/>
<stop offset="50%" stop-color="#FFB86C" stop-opacity="0.5"/>
<stop offset="70%" stop-color="#FF79C6" stop-opacity="0.3"/>
<stop offset="100%" stop-color="#FF2D78" stop-opacity="0"/>
</linearGradient>
<filter id="gl" x="-10%" y="-30%" width="120%" height="160%">
<feGaussianBlur stdDeviation="2" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<!-- HUD frame lines -->
<path d="M0 30 L120 30 L140 18 L260 18 L280 30 L520 30 L540 18 L660 18 L680 30 L800 30" stroke="#00F0FF" stroke-width="0.8" opacity="0.2"/>
<path d="M0 32 L120 32 L140 44 L260 44 L280 32 L520 32 L540 44 L660 44 L680 32 L800 32" stroke="#00F0FF" stroke-width="0.5" opacity="0.12"/>

<!-- Aurora wave 1 -->
<path fill="none" stroke="url(#ag1)" stroke-width="2.5" filter="url(#gl)">
<animate attributeName="d" dur="7s" repeatCount="indefinite" values="M0 30Q100 10 200 30T400 30T600 30T800 30;M0 30Q100 50 200 30T400 30T600 30T800 30;M0 30Q100 10 200 30T400 30T600 30T800 30"/>
</path>

<!-- Aurora wave 2 (counter-phase) -->
<path fill="none" stroke="url(#ag2)" stroke-width="1.5">
<animate attributeName="d" dur="5.5s" repeatCount="indefinite" values="M0 30Q150 48 300 30T600 30T800 30;M0 30Q150 12 300 30T600 30T800 30;M0 30Q150 48 300 30T600 30T800 30"/>
</path>

<!-- Aurora wave 3 (warm accent) -->
<path fill="none" stroke="url(#ag3)" stroke-width="1" opacity="0.6">
<animate attributeName="d" dur="9s" repeatCount="indefinite" values="M0 30Q200 15 400 30T800 30;M0 30Q200 45 400 30T800 30;M0 30Q200 15 400 30T800 30"/>
</path>

<!-- Center diamond accent -->
<polygon points="400,20 410,30 400,40 390,30" stroke="#00F0FF" stroke-width="1" fill="none" opacity="0.5">
<animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
</polygon>

<!-- Scanning dot -->
<circle cx="0" cy="30" r="2" fill="#00F0FF" opacity="0.6" filter="url(#gl)">
<animate attributeName="cx" values="0;800;0" dur="6s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.2;0.9;0.2" dur="6s" repeatCount="indefinite"/>
</circle>

<!-- Edge tick marks -->
<g opacity="0.25" stroke="#00F0FF" stroke-width="0.8">
<line x1="50" y1="25" x2="50" y2="35"/><line x1="150" y1="25" x2="150" y2="35"/>
<line x1="350" y1="25" x2="350" y2="35"/><line x1="450" y1="25" x2="450" y2="35"/>
<line x1="650" y1="25" x2="650" y2="35"/><line x1="750" y1="25" x2="750" y2="35"/>
</g>
</svg>