<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 760 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="sg" x="-15%" y="-15%" width="130%" height="130%">
<feGaussianBlur stdDeviation="2" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#9D7ECF" stop-opacity="0.6"/>
<stop offset="100%" stop-color="#9D7ECF" stop-opacity="0"/>
</linearGradient>
<linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#FF79C6" stop-opacity="0"/>
<stop offset="50%" stop-color="#FF79C6" stop-opacity="0.6"/>
<stop offset="100%" stop-color="#FF79C6" stop-opacity="0"/>
</linearGradient>
<linearGradient id="rg3" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#8BE9FD" stop-opacity="0"/>
<stop offset="100%" stop-color="#8BE9FD" stop-opacity="0.6"/>
</linearGradient>
</defs>

<!-- Background -->
<rect width="760" height="100" fill="#0D0B1E" rx="8"/>
<rect width="760" height="100" fill="none" stroke="#2A1F4E" stroke-width="1" rx="8"/>

<!-- Subtle grid -->
<g opacity="0.04">
<line x1="0" y1="50" x2="760" y2="50" stroke="#00F0FF" stroke-width="0.5"/>
<line x1="253" y1="0" x2="253" y2="100" stroke="#00F0FF" stroke-width="0.5"/>
<line x1="507" y1="0" x2="507" y2="100" stroke="#00F0FF" stroke-width="0.5"/>
</g>

<!-- ===== CARD 1: SYSTEM LOAD ===== -->
<rect x="25" y="20" width="210" height="60" rx="6" fill="#140E2D" stroke="#9D7ECF" stroke-width="1"/>
<!-- Accent line top -->
<line x1="35" y1="20" x2="95" y2="20" stroke="#9D7ECF" stroke-width="2"/>
<!-- Status dot -->
<circle cx="40" cy="38" r="3" fill="#9D7ECF" filter="url(#sg)">
<animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="52" y="42" font-family="monospace" font-size="11" fill="#C9B8FF" font-weight="bold">SYSTEM LOAD</text>
<text x="52" y="60" font-family="monospace" font-size="10" fill="#8BE9FD">NOMINAL [98%]</text>
<!-- Progress bar -->
<rect x="52" y="68" width="150" height="3" rx="1.5" fill="#1A1535"/>
<rect x="52" y="68" width="130" height="3" rx="1.5" fill="url(#rg1)">
<animate attributeName="width" values="100;147;130" dur="4s" repeatCount="indefinite"/>
</rect>

<!-- ===== CARD 2: ACTIVE KERNEL ===== -->
<rect x="275" y="20" width="210" height="60" rx="6" fill="#140E2D" stroke="#FF79C6" stroke-width="1"/>
<line x1="285" y1="20" x2="345" y2="20" stroke="#FF79C6" stroke-width="2"/>
<circle cx="290" cy="38" r="3" fill="#FF79C6" filter="url(#sg)">
<animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
</circle>
<text x="302" y="42" font-family="monospace" font-size="11" fill="#C9B8FF" font-weight="bold">ACTIVE KERNEL</text>
<text x="302" y="60" font-family="monospace" font-size="10" fill="#F1FA8C">SARA_V2.5.4</text>
<rect x="302" y="68" width="150" height="3" rx="1.5" fill="#1A1535"/>
<rect x="302" y="68" width="110" height="3" rx="1.5" fill="url(#rg2)">
<animate attributeName="width" values="80;140;110" dur="3.5s" repeatCount="indefinite"/>
</rect>

<!-- ===== CARD 3: NETWORK SPEED ===== -->
<rect x="525" y="20" width="210" height="60" rx="6" fill="#140E2D" stroke="#8BE9FD" stroke-width="1"/>
<line x1="535" y1="20" x2="595" y2="20" stroke="#8BE9FD" stroke-width="2"/>
<circle cx="540" cy="38" r="3" fill="#8BE9FD" filter="url(#sg)">
<animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
</circle>
<text x="552" y="42" font-family="monospace" font-size="11" fill="#C9B8FF" font-weight="bold">NETWORK SPEED</text>
<text x="552" y="60" font-family="monospace" font-size="10" fill="#FF79C6">10.4 GBPS</text>
<rect x="552" y="68" width="150" height="3" rx="1.5" fill="#1A1535"/>
<rect x="552" y="68" width="120" height="3" rx="1.5" fill="url(#rg3)">
<animate attributeName="width" values="90;145;120" dur="5s" repeatCount="indefinite"/>
</rect>

<!-- Corner brackets -->
<g stroke="#00F0FF" stroke-width="1" opacity="0.15">
<path d="M5 12L5 5L12 5" fill="none"/>
<path d="M755 12L755 5L748 5" fill="none"/>
<path d="M5 88L5 95L12 95" fill="none"/>
<path d="M755 88L755 95L748 95" fill="none"/>
</g>
</svg>