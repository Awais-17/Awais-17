<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 200 200" width="180" height="180" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="rc" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#00F0FF" stop-opacity="0.8"/>
<stop offset="40%" stop-color="#005A7A" stop-opacity="0.3"/>
<stop offset="100%" stop-color="#000" stop-opacity="0"/>
</radialGradient>
<radialGradient id="rc2" cx="50%" cy="50%" r="45%">
<stop offset="0%" stop-color="#FFB86C" stop-opacity="0.5"/>
<stop offset="50%" stop-color="#FF2D78" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#000" stop-opacity="0"/>
</radialGradient>
<filter id="cg" x="-30%" y="-30%" width="160%" height="160%">
<feGaussianBlur stdDeviation="4" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="sg" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="2" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#FFB86C" stop-opacity="0"/>
<stop offset="25%" stop-color="#FF7B00" stop-opacity="0.6"/>
<stop offset="50%" stop-color="#00F0FF" stop-opacity="0.8"/>
<stop offset="75%" stop-color="#FF7B00" stop-opacity="0.6"/>
<stop offset="100%" stop-color="#FFB86C" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- Background energy field -->
<circle cx="100" cy="100" r="55" fill="url(#rc)" opacity="0.6">
<animate attributeName="r" values="50;60;50" dur="4s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
</circle>

<!-- Warm corona glow (cosmic black hole inspired) -->
<circle cx="100" cy="100" r="48" fill="url(#rc2)" opacity="0.5">
<animate attributeName="r" values="45;55;45" dur="5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
</circle>

<!-- Accretion ring -->
<ellipse cx="100" cy="100" rx="70" ry="12" fill="none" stroke="url(#ag)" stroke-width="2" opacity="0.4">
<animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="12s" repeatCount="indefinite"/>
</ellipse>

<!-- Outermost calibration ring -->
<circle cx="100" cy="100" r="82" stroke="#00F0FF" stroke-width="0.8" stroke-dasharray="8 18 4 18" opacity="0.25" fill="none">
<animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="30s" repeatCount="indefinite"/>
</circle>

<!-- Outer HUD ring -->
<circle cx="100" cy="100" r="72" stroke="#00F0FF" stroke-width="1.2" stroke-dasharray="12 10" opacity="0.35" fill="none">
<animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
</circle>

<!-- Middle ring -->
<circle cx="100" cy="100" r="60" stroke="#FF7B00" stroke-width="0.8" stroke-dasharray="6 8" opacity="0.3" fill="none">
<animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite"/>
</circle>

<!-- Inner precision ring -->
<circle cx="100" cy="100" r="45" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="30 80" opacity="0.5" fill="none">
<animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
</circle>

<!-- Arc reactor plates (10 petals arranged in circle using SMIL) -->
<g opacity="0.6" filter="url(#sg)">
<!-- Plate group spinning -->
<g>
<animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="25s" repeatCount="indefinite"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(36 100 100)"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(72 100 100)"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(108 100 100)"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(144 100 100)"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(180 100 100)"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(216 100 100)"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(252 100 100)"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(288 100 100)"/>
<path d="M100 38L110 50L106 65L94 65L90 50Z" fill="#00F0FF" stroke="#FFF" stroke-width="0.8" opacity="0.5" transform="rotate(324 100 100)"/>
</g>
</g>

<!-- Rotating crosshair -->
<g opacity="0.2">
<animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="18s" repeatCount="indefinite"/>
<line x1="100" y1="65" x2="100" y2="135" stroke="#00F0FF" stroke-width="0.6"/>
<line x1="65" y1="100" x2="135" y2="100" stroke="#00F0FF" stroke-width="0.6"/>
</g>

<!-- Core inner rings -->
<circle cx="100" cy="100" r="28" fill="#0D0B1E" stroke="#00F0FF" stroke-width="1.5" filter="url(#cg)"/>
<circle cx="100" cy="100" r="18" fill="#00F0FF" opacity="0.7" filter="url(#cg)">
<animate attributeName="r" values="16;20;16" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="100" cy="100" r="8" fill="#FFF" opacity="0.9"/>
</svg>
