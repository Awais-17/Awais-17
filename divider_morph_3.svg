<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="gm3" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="2" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<!-- Dashed rails -->
<line x1="0" y1="30" x2="350" y2="30" stroke="#251B47" stroke-width="1" stroke-dasharray="8 6"/>
<line x1="450" y1="30" x2="800" y2="30" stroke="#251B47" stroke-width="1" stroke-dasharray="8 6"/>

<!-- Center rotating hexagon (outer) -->
<polygon points="400,12 418,21 418,39 400,48 382,39 382,21" stroke="#9D7ECF" stroke-width="1.5" fill="none" filter="url(#gm3)">
<animateTransform attributeName="transform" type="rotate" from="0 400 30" to="360 400 30" dur="10s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
</polygon>

<!-- Inner counter-rotating hexagon -->
<polygon points="400,17 413,23 413,37 400,43 387,37 387,23" stroke="#00F0FF" stroke-width="1" fill="none">
<animateTransform attributeName="transform" type="rotate" from="360 400 30" to="0 400 30" dur="7s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
</polygon>

<!-- Pulsing core circle -->
<circle cx="400" cy="30" r="6" stroke="#8BE9FD" stroke-width="1" fill="none">
<animate attributeName="r" values="4;8;4" dur="3s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="400" cy="30" r="2.5" fill="#00F0FF" opacity="0.8">
<animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
</circle>

<!-- Side connector dots -->
<circle cx="355" cy="30" r="2" fill="#9D7ECF" opacity="0.5">
<animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="445" cy="30" r="2" fill="#9D7ECF" opacity="0.5">
<animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
</circle>
</svg>