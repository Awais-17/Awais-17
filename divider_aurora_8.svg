<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="g8" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#FF2D78" stop-opacity="0"/>
<stop offset="30%" stop-color="#FF79C6" stop-opacity="0.6"/>
<stop offset="50%" stop-color="#FFB86C" stop-opacity="0.9"/>
<stop offset="70%" stop-color="#FF79C6" stop-opacity="0.6"/>
<stop offset="100%" stop-color="#FF2D78" stop-opacity="0"/>
</linearGradient>
<filter id="gl8" x="-10%" y="-30%" width="120%" height="160%">
<feGaussianBlur stdDeviation="2" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<!-- Wave-style HUD bar (reference image style 3) -->
<path d="M0 30H200L220 20L250 40L280 20L310 40L340 20L360 30H440L460 20L490 40L520 20L550 40L580 20L600 30H800" stroke="#00F0FF" stroke-width="1" opacity="0.3"/>

<!-- Warm energy pulse through center -->
<path fill="none" stroke="url(#g8)" stroke-width="2" filter="url(#gl8)">
<animate attributeName="d" dur="6s" repeatCount="indefinite" values="M0 30Q200 15 400 30T800 30;M0 30Q200 45 400 30T800 30;M0 30Q200 15 400 30T800 30"/>
</path>

<!-- Thin cyan echo line -->
<path fill="none" stroke="#00F0FF" stroke-width="0.8" opacity="0.4">
<animate attributeName="d" dur="6s" begin="1.5s" repeatCount="indefinite" values="M0 30Q200 45 400 30T800 30;M0 30Q200 15 400 30T800 30;M0 30Q200 45 400 30T800 30"/>
</path>

<!-- Energy nodes at wave peaks -->
<circle cx="250" cy="30" r="2" fill="#FFB86C">
<animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
<animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="400" cy="30" r="2.5" fill="#FF79C6">
<animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
<animate attributeName="r" values="2;3.5;2" dur="2.5s" repeatCount="indefinite"/>
</circle>
<circle cx="550" cy="30" r="2" fill="#FFB86C">
<animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
<animate attributeName="r" values="1.5;3;1.5" dur="2s" begin="1s" repeatCount="indefinite"/>
</circle>
</svg>